name: CI Project

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Обновили с v3 до v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Обновили с v4 до v5
      with:
        python-version: '3.11' # Поставили версию посвежее

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Run tests or script
      run: |
        # ВНИМАНИЕ: замените 'main.py' ниже на имя вашего файла!
        python main.py
